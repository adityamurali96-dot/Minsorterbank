name: Build release binaries

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            artifact: Minsorterbank-windows-x64.exe
          - os: macos-14          # Apple Silicon
            label: macos-arm64
            artifact: Minsorterbank-macos-arm64.dmg

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # On Windows, the prebuilt PyInstaller bootloader is widely
      # flagged as a false-positive by antivirus engines (Defender,
      # Avast, etc.) because real malware shares the same shipped
      # bootloader binary. Building the bootloader from source on
      # the runner gives the resulting .exe a fresh fingerprint that
      # AV signatures haven't been trained on, which dramatically
      # reduces false positives.
      - name: Install PyInstaller (Windows, build bootloader from source)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch v6.10.0 https://github.com/pyinstaller/pyinstaller.git pyinstaller-src
          cd pyinstaller-src/bootloader
          python ./waf distclean all
          cd ..
          pip install .

      - name: Install PyInstaller (macOS / Linux, prebuilt)
        if: runner.os != 'Windows'
        shell: bash
        run: pip install pyinstaller==6.10.0

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller --clean -y Minsorterbank.spec

      # ---------- Windows packaging ----------
      # The spec produces a single dist/Minsorterbank.exe in onefile mode.
      # Ship that file directly as the release artifact.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item dist/Minsorterbank.exe dist/${{ matrix.artifact }}

      # ---------- macOS packaging ----------
      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # PyInstaller produces dist/Minsorterbank.app for the BUNDLE target.
          # Wrap it in a simple DMG (drag-to-Applications).
          mkdir -p dmg_staging
          cp -R dist/Minsorterbank.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Minsorterbank" \
                         -srcfolder dmg_staging \
                         -ov -format UDZO \
                         "dist/${{ matrix.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true

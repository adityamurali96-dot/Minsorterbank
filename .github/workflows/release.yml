name: Build release archive

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # One cross-platform portable zip containing the app source plus a
  # double-click launcher for each OS:
  #   - Start-Minsorterbank.bat       (Windows)
  #   - Start-Minsorterbank.command   (macOS)
  # The launchers install Python deps locally on first run and open
  # the Minsorterbank UI in the user's browser on http://127.0.0.1.
  # This sidesteps Windows-Defender false positives that PyInstaller
  # one-file .exe builds suffer from, and removes the need for code
  # signing on either platform.
  # ------------------------------------------------------------------
  build:
    name: Build portable zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage portable files
        run: |
          set -euxo pipefail
          mkdir -p staging/Minsorterbank
          cp -R app staging/Minsorterbank/
          cp sort_statement.py staging/Minsorterbank/
          cp requirements.txt staging/Minsorterbank/
          cp README.md staging/Minsorterbank/
          cp Start-Minsorterbank.bat staging/Minsorterbank/
          cp Start-Minsorterbank.command staging/Minsorterbank/
          chmod +x staging/Minsorterbank/Start-Minsorterbank.command

          cat > staging/Minsorterbank/READ-ME-FIRST.txt <<'EOF'
          Minsorterbank
          =============

          Pick the line for your computer below.

          ----------------------------------------------------------
          Windows
          ----------------------------------------------------------
            Double-click:   Start-Minsorterbank.bat

            First time only: if Python is not installed yet, the
            launcher will open the Python download page in your
            browser. Click the big yellow "Download Python" button,
            run the installer, and on the FIRST installer screen
            TICK the box that says "Add python.exe to PATH".
            Then double-click  Start-Minsorterbank.bat  again.

          ----------------------------------------------------------
          macOS
          ----------------------------------------------------------
            Double-click:   Start-Minsorterbank.command

            First time only: macOS may say
              "Apple cannot check it for malicious software."
            Right-click  Start-Minsorterbank.command  -> Open ->
            Open. After this once, regular double-click works.

            If Python 3 is not installed yet, the launcher will
            pop up a dialog and open the Python download page.
            Install Python, then double-click the file again.

          ----------------------------------------------------------
          What happens next
          ----------------------------------------------------------
          A Terminal / Command Prompt window appears (leave it
          open) and your default browser opens the Minsorterbank
          page on a local address such as http://127.0.0.1:54321.
          Upload your bank statement and download the sorted
          spreadsheet.

          Close the Terminal / Command Prompt window to quit.

          Nothing leaves your computer; the app runs entirely on
          localhost.
          EOF

      - name: Create zip
        run: |
          set -euxo pipefail
          cd staging
          # -y preserves symlinks; not strictly needed here but harmless.
          # Use zip (not Compress-Archive) so the executable bit on the
          # .command file survives extraction on macOS.
          zip -r ../Minsorterbank.zip Minsorterbank
          cd ..
          ls -lh Minsorterbank.zip
          unzip -l Minsorterbank.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minsorterbank.zip
          path: Minsorterbank.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
